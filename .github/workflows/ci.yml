name: CI

# Run lint, type-check, build and test on every pull request and on every
# push to main or dev. This is the safety gate that the publish workflow
# previously relied on operators triggering manually.

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check for package-lock.json
        id: lockfile
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: ${{ steps.lockfile.outputs.exists == 'true' && 'npm' || '' }}

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ steps.lockfile.outputs.exists }}" = "true" ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        run: npm run lint

      - name: Type-check (backend and webapp)
        run: |
          npm run check:ts
          npx tsc -p tsconfig.webapp.json --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Release documentation and package truth
        run: npm run check:release-docs
