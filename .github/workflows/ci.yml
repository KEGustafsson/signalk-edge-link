name: CI

# Replaces the earlier publish-only workflow_dispatch trigger, which left
# every PR un-gated. This workflow exists so lint/type-check/build/test
# block merge automatically rather than requiring a human to click "Run".

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  # Weekly blocking dependency audit (see the audit-blocking job). A scheduled
  # gate catches newly-published advisories in existing dependencies without
  # letting registry/network flakiness block day-to-day PR merges.
  schedule:
    - cron: "0 6 * * 1"

# Cancel superseded runs for the same ref so rapid pushes don't pile up
# redundant CI. The scheduled audit uses a distinct group key so it is never
# cancelled by branch activity.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'schedule' && 'schedule' || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matrix starts at the supported floor (package.json engines: >=20).
        # 20 is the real minimum: Node 18 is EOL and the build toolchain
        # (copy-webpack-plugin@14 uses Array.prototype.toSorted) requires
        # Node >=20.9. 24 (current) is included for forward coverage.
        node-version: [20, 22, 24]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # CI only reads — don't leave the GITHUB_TOKEN in .git/config
          # during the job.
          persist-credentials: false

      - name: Check for package-lock.json
        id: lockfile
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ steps.lockfile.outputs.exists == 'true' && 'npm' || '' }}

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ steps.lockfile.outputs.exists }}" = "true" ]; then
            npm ci
          else
            npm install
          fi

      # Single required gate: type-check (backend) + lint + full test suite.
      # Tests run against src/ via ts-jest (no stale lib/ artifact).
      - name: Verify (check:ts + lint + test)
        run: npm run verify

      # Enforce the coverageThreshold configured in package.json. Gated on a
      # single Node version so coverage runs once per workflow, not 3x.
      - name: Coverage gate
        if: matrix.node-version == 22
        run: npm run test:coverage

      - name: Type-check (webapp)
        run: npx tsc -p tsconfig.webapp.json --noEmit

      - name: Build
        run: npm run build

      - name: Conformance vectors are reproducible from source
        run: |
          npm run conformance:generate
          git diff --exit-code -- __conformance__/vectors/golden.json

      - name: Release documentation and package truth
        run: npm run check:release-docs

  # Non-blocking dependency audit. Kept out of the required `ci` gate so a
  # newly-published advisory or registry/network hiccup cannot block merges.
  # The npm-audit test also runs in the main suite, but there it tolerates an
  # unreachable registry (reads as zero vulnerabilities); this isolated job
  # surfaces advisories explicitly without gating merges.
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit test
        run: npx jest __tests__/npm-audit.test.js

  # Blocking dependency audit, runs ONLY on the weekly schedule. Unlike the
  # per-PR `audit` job above this is NOT continue-on-error and fails the run on
  # any high/critical advisory in the production dependency tree, so a newly
  # disclosed vulnerability surfaces as a red scheduled run.
  audit-blocking:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Fails (non-zero exit) on any high/critical advisory in runtime deps.
      - name: Audit production dependencies (high/critical, blocking)
        run: npm audit --omit=dev --audit-level=high
