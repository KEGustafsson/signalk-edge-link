name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - name: Check for package-lock.json
        id: lockfile
        run: echo "exists=$(test -f package-lock.json && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ steps.lockfile.outputs.exists == 'true' && 'npm' || '' }}
      - name: Install dependencies
        run: |
          if [ "${{ steps.lockfile.outputs.exists }}" == "true" ]; then
            npm ci
          else
            npm install
          fi
      - run: npm run build
      - run: npm run lint
      - run: npm test -- --coverage
