name: CI

# Replaces the earlier publish-only workflow_dispatch trigger, which left
# every PR un-gated. This workflow exists so lint/type-check/build/test
# block merge automatically rather than requiring a human to click "Run".

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matrix starts at the supported floor (package.json engines: >=18).
        # 18 is the real minimum: the @msgpack/msgpack@3 runtime dependency
        # declares engines.node >= 18, so the plugin cannot run on Node 16.
        node-version: [18, 20, 22]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # CI only reads — don't leave the GITHUB_TOKEN in .git/config
          # during the job.
          persist-credentials: false

      - name: Check for package-lock.json
        id: lockfile
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ steps.lockfile.outputs.exists == 'true' && 'npm' || '' }}

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ steps.lockfile.outputs.exists }}" = "true" ]; then
            npm ci
          else
            npm install
          fi

      # Single required gate: type-check (backend) + lint + full test suite.
      # Tests run against src/ via ts-jest (no stale lib/ artifact).
      - name: Verify (check:ts + lint + test)
        run: npm run verify

      - name: Type-check (webapp)
        run: npx tsc -p tsconfig.webapp.json --noEmit

      - name: Build
        run: npm run build

      - name: Conformance vectors are reproducible from source
        run: |
          npm run conformance:generate
          git diff --exit-code -- __conformance__/vectors/golden.json

      - name: Release documentation and package truth
        run: npm run check:release-docs
