name: Publish to GitHub Packages

# Test, build, pack and publish the plugin as a tarball to the repository's
# GitHub Packages npm registry on every push to main or dev.  The published
# package is namespaced under the repository owner's scope (for example
# @kegustafsson/signalk-edge-link) and tagged with a branch-qualified
# prerelease version derived from the commit SHA, so every commit produces a
# unique, installable snapshot without clashing with the canonical
# unscoped package name used for public releases.

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Derive scope (repository owner, lowercased)
        id: scope
        run: |
          echo "scope=@${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "package=@${GITHUB_REPOSITORY_OWNER,,}/signalk-edge-link" >> "$GITHUB_OUTPUT"

      - name: Check for package-lock.json
        id: lockfile
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: ${{ steps.scope.outputs.scope }}
          cache: ${{ steps.lockfile.outputs.exists == 'true' && 'npm' || '' }}

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ steps.lockfile.outputs.exists }}" = "true" ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        run: npm run lint

      - name: Type-check (backend and webapp)
        run: |
          npm run check:ts
          npx tsc -p tsconfig.webapp.json --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Compute snapshot version
        id: ver
        run: |
          BASE_VERSION="$(node -p "require('./package.json').version")"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          # Normalise branch name to a semver-safe prerelease identifier.
          # printf (not echo) avoids the trailing newline that tr -c would
          # convert to a stray '-'; sed strips leading/trailing hyphens while
          # preserving dots so the slug always starts and ends with [a-z0-9.].
          BRANCH_SLUG="$(printf '%s' "${GITHUB_REF_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -c 'a-z0-9.' '-' \
            | sed -E 's/^-+//; s/-+$//')"
          SNAPSHOT="${BASE_VERSION}-${BRANCH_SLUG}.${SHORT_SHA}"
          echo "snapshot=${SNAPSHOT}" >> "$GITHUB_OUTPUT"

      - name: Rewrite package name and version for GitHub Packages
        run: |
          npm pkg set name='${{ steps.scope.outputs.package }}'
          npm version '${{ steps.ver.outputs.snapshot }}' --no-git-tag-version --allow-same-version

      - name: Pack tarball
        id: pack
        run: |
          PACKED_TGZ="$(npm pack | tail -n 1)"
          echo "packed_tgz=${PACKED_TGZ}" >> "$GITHUB_OUTPUT"

      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: signalk-edge-link-${{ steps.ver.outputs.snapshot }}
          path: ${{ steps.pack.outputs.packed_tgz }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish "${{ steps.pack.outputs.packed_tgz }}" --access public
