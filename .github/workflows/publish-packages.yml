name: Publish to GitHub Packages

# Test, build, pack and publish the plugin as a tarball to the repository's
# GitHub Packages npm registry on every push to main or dev.  The published
# package is namespaced under the repository owner's scope (for example
# @kegustafsson/signalk-edge-link) and published using the version declared
# in package.json verbatim, so the registry only ever shows plain semver
# versions without branch slugs or commit SHAs.  Because GitHub Packages
# rejects re-publishing an existing version, bump the version in
# package.json before pushing to main or dev.

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Derive scope (repository owner, lowercased)
        id: scope
        run: |
          echo "scope=@${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "package=@${GITHUB_REPOSITORY_OWNER,,}/signalk-edge-link" >> "$GITHUB_OUTPUT"

      - name: Check for package-lock.json
        id: lockfile
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: ${{ steps.scope.outputs.scope }}
          cache: ${{ steps.lockfile.outputs.exists == 'true' && 'npm' || '' }}

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ steps.lockfile.outputs.exists }}" = "true" ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        run: npm run lint

      - name: Type-check (backend and webapp)
        run: |
          npm run check:ts
          npx tsc -p tsconfig.webapp.json --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Rewrite package name for GitHub Packages
        run: npm pkg set name='${{ steps.scope.outputs.package }}'

      - name: Pack tarball
        id: pack
        run: |
          PACKED_TGZ="$(npm pack | tail -n 1)"
          echo "packed_tgz=${PACKED_TGZ}" >> "$GITHUB_OUTPUT"

      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: signalk-edge-link
          path: ${{ steps.pack.outputs.packed_tgz }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish "${{ steps.pack.outputs.packed_tgz }}" --access public
