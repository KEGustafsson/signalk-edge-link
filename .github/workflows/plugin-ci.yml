name: Plugin CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      test-command:
        description: Command to run tests
        required: false
        default: npm test
        type: string

      build-command:
        description: Command to build the plugin
        required: false
        default: npm run build --if-present
        type: string

      node-versions:
        description: 'JSON array of Node versions, example: ["24"]'
        required: false
        default: '["24"]'
        type: string

      enable-armv7:
        description: Run armv7 (Cerbo GX) tests via QEMU
        required: false
        default: false
        type: boolean

      enable-signalk-integration:
        description: Start SignalK server and install plugin for integration testing
        required: false
        default: false
        type: boolean

      signalk-server-version:
        description: SignalK server version for integration testing
        required: false
        default: latest
        type: string

jobs:
  test-plugin-auto:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    uses: dirkwa/signalk-server/.github/workflows/plugin-ci.yml@feat-ci-for-plugins
    with:
      test-command: npm test
      build-command: npm run build --if-present
      node-versions: '["24"]'
      enable-armv7: false
      enable-signalk-integration: false
      signalk-server-version: latest

  test-plugin-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: dirkwa/signalk-server/.github/workflows/plugin-ci.yml@feat-ci-for-plugins
    with:
      test-command: ${{ inputs.test-command }}
      build-command: ${{ inputs.build-command }}
      node-versions: ${{ inputs.node-versions }}
      enable-armv7: ${{ inputs.enable-armv7 }}
      enable-signalk-integration: ${{ inputs.enable-signalk-integration }}
      signalk-server-version: ${{ inputs.signalk-server-version }}
